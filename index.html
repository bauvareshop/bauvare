<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BAUVARE | Catálogo</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:Arial,sans-serif;
  background:#1f1f1f;
  color:#fff;
}

.header{
  height:85px;
  background:#111;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 6%;
  position:sticky;
  top:0;
  z-index:100;
  border-bottom:1px solid #333;
}

.logo{
  font-size:30px;
  font-weight:bold;
  letter-spacing:6px;
}

.nav a{
  color:#fff;
  text-decoration:none;
  margin:0 18px;
  font-size:15px;
}

.carrito{
  font-size:22px;
}

.banner{
  width:92%;
  margin:30px auto;
  background:#2b2b2b;
  padding:30px;
  border-radius:14px;
}

.banner h1{font-size:32px}
.banner p{margin-top:8px;color:#ccc}

.catalogo{
  width:92%;
  margin:auto;
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:28px;
  padding-bottom:60px;
}

.producto{
  position:relative;
  cursor:pointer;
  transition:.3s;
}

.producto:hover{
  transform:translateY(-6px);
}

.producto img{
  width:100%;
  height:430px;
  object-fit:cover;
  border-radius:14px;
  background:#333;
}

.producto h3{
  margin-top:12px;
  font-size:17px;
}

.producto p{
  margin-top:7px;
  font-weight:bold;
}

.descuento{
  position:absolute;
  top:12px;
  left:12px;
  background:#b97686;
  padding:6px 12px;
  border-radius:20px;
  font-size:14px;
}

.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.88);
  z-index:1000;
  align-items:center;
  justify-content:center;
  padding:20px;
}

.modal-content{
  background:#f7f7f7;
  color:#111;
  width:95%;
  max-width:1200px;
  max-height:92vh;
  overflow-y:auto;
  display:grid;
  grid-template-columns:1.5fr 1fr;
  gap:35px;
  padding:30px;
  border-radius:18px;
  position:relative;
}

.cerrar{
  position:absolute;
  top:12px;
  right:18px;
  font-size:34px;
  background:none;
  border:none;
  cursor:pointer;
}

.galeria{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
}

.galeria img{
  width:100%;
  height:520px;
  object-fit:cover;
  border-radius:12px;
}

.info h2{
  font-size:32px;
  margin-bottom:10px;
}

.precio{
  font-size:24px;
  font-weight:bold;
  margin-bottom:22px;
}

.info label{
  display:block;
  margin-top:16px;
  margin-bottom:7px;
  font-weight:bold;
}

.info select{
  width:100%;
  padding:13px;
  border-radius:10px;
  border:1px solid #ccc;
  font-size:15px;
}

.btn-wsp{
  width:100%;
  padding:16px;
  margin-top:28px;
  background:#b97686;
  color:white;
  border:none;
  border-radius:12px;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
}

.btn-wsp:hover{
  background:#a96173;
}

.wsp{
  position:fixed;
  right:25px;
  bottom:25px;
  width:58px;
  height:58px;
  background:#25D366;
  color:#fff;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  text-decoration:none;
  font-size:26px;
  z-index:999;
}

@media(max-width:900px){
  .catalogo{
    grid-template-columns:repeat(2,1fr);
    gap:18px;
  }

  .producto img{
    height:310px;
  }

  .nav{
    display:none;
  }

  .modal-content{
    grid-template-columns:1fr;
  }

  .galeria{
    grid-template-columns:repeat(2,1fr);
  }

  .galeria img{
    height:340px;
  }
}

@media(max-width:480px){
  .header{
    height:75px;
    padding:0 5%;
  }

  .logo{
    font-size:22px;
    letter-spacing:4px;
  }

  .banner{
    width:94%;
    padding:20px;
  }

  .banner h1{
    font-size:24px;
  }

  .catalogo{
    width:94%;
    grid-template-columns:repeat(2,1fr);
    gap:14px;
  }

  .producto img{
    height:250px;
  }

  .producto h3{
    font-size:14px;
  }

  .producto p{
    font-size:14px;
  }

  .modal-content{
    padding:18px;
  }

  .galeria img{
    height:260px;
  }

  .info h2{
    font-size:24px;
  }
}
</style>
</head>

<body>

<header class="header">
  <div class="logo">BAUVARE</div>
  <nav class="nav">
    <a href="#">Inicio</a>
    <a href="#catalogo">Catálogo</a>
    <a href="#">Información</a>
  </nav>
  <div class="carrito">🛒</div>
</header>

<section class="banner">
  <h1>Catálogo BAUVARE</h1>
  <p>Urban formal wear</p>
</section>

<main class="catalogo" id="catalogo"></main>

<div class="modal" id="modal">
  <div class="modal-content">
    <button class="cerrar" onclick="cerrarModal()">×</button>

    <div class="galeria" id="galeria"></div>

    <div class="info">
      <h2 id="nombreProducto"></h2>
      <p class="precio" id="precioProducto"></p>

      <label>Color</label>
      <select id="color"></select>

      <label>Talla</label>
      <select id="talla"></select>

      <label>Departamento</label>
      <select id="departamento">
        <option value="Lima">Lima</option>
      </select>

      <label>Provincia</label>
      <select id="provincia">
        <option value="Lima">Lima</option>
      </select>

      <label>Distrito</label>
      <select id="distrito">
        <option>San Juan de Lurigancho</option>
        <option>Los Olivos</option>
        <option>Comas</option>
        <option>Independencia</option>
        <option>San Martín de Porres</option>
        <option>Cercado de Lima</option>
        <option>La Victoria</option>
        <option>Miraflores</option>
        <option>San Isidro</option>
        <option>Santiago de Surco</option>
        <option>Chorrillos</option>
        <option>Otro distrito</option>
      </select>

      <button class="btn-wsp" onclick="pedirWhatsApp()">Pedir por WhatsApp</button>
    </div>
  </div>
</div>

<a class="wsp" href="https://wa.me/51999999999" target="_blank">☘</a>

<script>
const productos = [
  {
    nombre:"Pantalón Cargo Negro",
    precio:"S/ 89.90",
    descuento:10,
    imagenes:[
      "https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?w=900",
      "https://images.unsplash.com/photo-1516762689617-e1cffcef479d?w=900"
    ],
    colores:["Negro","Plomo","Beige"],
    tallas:["S","M","L","XL"]
  },
  {
    nombre:"Polo Oversize Blanco",
    precio:"S/ 59.90",
    descuento:0,
    imagenes:[
      "https://images.unsplash.com/photo-1523398002811-999ca8dec234?w=900",
      "https://images.unsplash.com/photo-1503341455253-b2e723bb3dbb?w=900"
    ],
    colores:["Blanco","Negro"],
    tallas:["S","M","L"]
  },
  {
    nombre:"Camisa Urbana",
    precio:"S/ 79.90",
    descuento:15,
    imagenes:[
      "https://images.unsplash.com/photo-1602810318383-e386cc2a3ccf?w=900",
      "https://images.unsplash.com/photo-1598033129183-c4f50c736f10?w=900"
    ],
    colores:["Negro","Azul","Blanco"],
    tallas:["M","L","XL"]
  },
  {
    nombre:"Casaca Formal Urbana",
    precio:"S/ 129.90",
    descuento:0,
    imagenes:[
      "https://images.unsplash.com/photo-1520975954732-35dd22299614?w=900",
      "https://images.unsplash.com/photo-1551488831-00ddcb6c6bd3?w=900"
    ],
    colores:["Negro","Marrón"],
    tallas:["S","M","L","XL"]
  }
];

const catalogo = document.getElementById("catalogo");
let productoActual = null;

productos.forEach((p,index)=>{
  catalogo.innerHTML += `
    <div class="producto" onclick="abrirModal(${index})">
      ${p.descuento ? `<span class="descuento">-${p.descuento}%</span>` : ""}
      <img src="${p.imagenes[0]}" alt="${p.nombre}">
      <h3>${p.nombre}</h3>
      <p>${p.precio}</p>
    </div>
  `;
});

function abrirModal(index){
  productoActual = productos[index];

  document.getElementById("nombreProducto").textContent = productoActual.nombre;
  document.getElementById("precioProducto").textContent = productoActual.precio;

  document.getElementById("galeria").innerHTML = productoActual.imagenes.map(img =>
    `<img src="${img}" alt="${productoActual.nombre}">`
  ).join("");

  document.getElementById("color").innerHTML = productoActual.colores.map(c =>
    `<option value="${c}">${c}</option>`
  ).join("");

  document.getElementById("talla").innerHTML = productoActual.tallas.map(t =>
    `<option value="${t}">${t}</option>`
  ).join("");

  document.getElementById("modal").style.display = "flex";
}

function cerrarModal(){
  document.getElementById("modal").style.display = "none";
}

function pedirWhatsApp(){
  const color = document.getElementById("color").value;
  const talla = document.getElementById("talla").value;
  const departamento = document.getElementById("departamento").value;
  const provincia = document.getElementById("provincia").value;
  const distrito = document.getElementById("distrito").value;

  const mensaje = `Hola BAUVARE, quiero realizar un pedido:

Producto: ${productoActual.nombre}
Color: ${color}
Talla: ${talla}
Precio: ${productoActual.precio}

Ubicación:
Departamento: ${departamento}
Provincia: ${provincia}
Distrito: ${distrito}`;

  const numero = "51999999999";
  window.open(`https://wa.me/${numero}?text=${encodeURIComponent(mensaje)}`, "_blank");
}

window.onclick = function(e){
  if(e.target === document.getElementById("modal")){
    cerrarModal();
  }
}
</script>

</body>
</html>
