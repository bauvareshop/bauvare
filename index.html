<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BAUVARE | Catálogo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="navbar">
  <div class="logo">BAUVARE</div>
  <nav>
    <a href="#">Inicio</a>
    <a href="#catalogo">Catálogo</a>
    <a href="#">Información</a>
  </nav>
  <div class="cart">🛒</div>
</header>

<section class="banner">
  <h1>Catálogo BAUVARE</h1>
  <p>Urban formal wear</p>
</section>

<main class="catalogo" id="catalogo"></main>

<div class="modal" id="modal">
  <div class="modal-content">
    <button class="cerrar" onclick="cerrarModal()">×</button>

    <div class="modal-imgs" id="modalImgs"></div>

    <div class="modal-info">
      <h2 id="modalNombre"></h2>
      <p class="precio" id="modalPrecio"></p>

      <label>Color</label>
      <select id="colorSeleccionado"></select>

      <label>Talla</label>
      <select id="tallaSeleccionada"></select>

      <label>Departamento</label>
      <select id="departamento">
        <option value="Lima">Lima</option>
      </select>

      <label>Provincia</label>
      <select id="provincia">
        <option value="Lima">Lima</option>
      </select>

      <label>Distrito</label>
      <select id="distrito">
        <option>San Juan de Lurigancho</option>
        <option>Los Olivos</option>
        <option>Comas</option>
        <option>Independencia</option>
        <option>San Martín de Porres</option>
        <option>La Victoria</option>
        <option>Gamarra</option>
        <option>Cercado de Lima</option>
        <option>San Isidro</option>
        <option>Miraflores</option>
        <option>Surco</option>
        <option>Chorrillos</option>
        <option>Otro distrito</option>
      </select>

      <button class="btn-wsp" onclick="pedirWhatsApp()">Pedir por WhatsApp</button>
    </div>
  </div>
</div>

<a class="wsp-flotante" href="https://wa.me/51999999999" target="_blank">☘</a>

<script src="productos.js"></script>
<script>
  const catalogo = document.getElementById("catalogo");
  let productoActual = null;

  productos.forEach((producto, index) => {
    catalogo.innerHTML += `
      <div class="producto" onclick="abrirModal(${index})">
        ${producto.descuento ? `<span class="descuento">-${producto.descuento}%</span>` : ""}
        <img src="${producto.imagenes[0]}" alt="${producto.nombre}">
        <div class="producto-info">
          <h3>${producto.nombre}</h3>
          <p>${producto.precio}</p>
        </div>
      </div>
    `;
  });

  function abrirModal(index) {
    productoActual = productos[index];

    document.getElementById("modalNombre").textContent = productoActual.nombre;
    document.getElementById("modalPrecio").textContent = productoActual.precio;

    document.getElementById("modalImgs").innerHTML = productoActual.imagenes.map(img => `
      <img src="${img}" alt="${productoActual.nombre}">
    `).join("");

    document.getElementById("colorSeleccionado").innerHTML = productoActual.colores.map(color => `
      <option value="${color}">${color}</option>
    `).join("");

    document.getElementById("tallaSeleccionada").innerHTML = productoActual.tallas.map(talla => `
      <option value="${talla}">${talla}</option>
    `).join("");

    document.getElementById("modal").style.display = "flex";
  }

  function cerrarModal() {
    document.getElementById("modal").style.display = "none";
  }

  function pedirWhatsApp() {
    const color = document.getElementById("colorSeleccionado").value;
    const talla = document.getElementById("tallaSeleccionada").value;
    const departamento = document.getElementById("departamento").value;
    const provincia = document.getElementById("provincia").value;
    const distrito = document.getElementById("distrito").value;

    const mensaje = `Hola BAUVARE, quiero realizar un pedido:

Producto: ${productoActual.nombre}
Color: ${color}
Talla: ${talla}
Precio: ${productoActual.precio}

Ubicación:
Departamento: ${departamento}
Provincia: ${provincia}
Distrito: ${distrito}`;

    const numero = "51999999999";
    window.open(`https://wa.me/${numero}?text=${encodeURIComponent(mensaje)}`, "_blank");
  }
</script>

</body>
</html>
