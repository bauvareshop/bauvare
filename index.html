<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BAUVARE | Catálogo</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Inter',Arial,sans-serif;
  background:#0a0a0a;
  color:#e8e8e8;
}

/* ===== HEADER ===== */
.header{
  height:82px;
  background:#0a0a0a;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 6%;
  position:sticky;
  top:0;
  z-index:100;
  border-bottom:1px solid #222;
}

.logo img{
  height:55px;
  width:auto;
  object-fit:contain;
}

.redes{
  display:flex;
  gap:12px;
}

.redes a{
  color:#e8e8e8;
  text-decoration:none;
  font-size:14px;
  border:1px solid #333;
  padding:8px 12px;
  border-radius:20px;
  transition:all .3s;
}

.redes a:hover{
  background:#d4af37;
  border-color:#d4af37;
  color:#0a0a0a;
}

/* ===== PRESENTACIÓN ===== */
.presentacion{
  width:92%;
  max-width:1000px;
  margin:12px auto 20px;
  text-align:center;
  padding:8px 16px;
  background:rgba(20,20,20,.6);
  border-radius:10px;
  border-left:3px solid #d4af37;
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
}

.presentacion-inner h1{
  font-size:22px;
  letter-spacing:4px;
  font-weight:800;
  color:#e8e8e8;
  margin-bottom:0px;
  line-height:1.2;
}

.presentacion-inner h1 span{
  color:#d4af37;
}

.presentacion-inner .frase{
  font-size:11px;
  font-style:italic;
  color:#d4af37;
  font-weight:500;
  letter-spacing:0.3px;
  opacity:.85;
  margin:0;
}

/* ===== RESPONSIVE MÓVIL ===== */
@media(max-width:768px){
  .presentacion{
    padding:6px 14px;
    margin:8px auto 14px;
    border-left-width:2px;
  }
  
  .presentacion-inner h1{
    font-size:18px;
    letter-spacing:3px;
  }
  
  .presentacion-inner .frase{
    font-size:10px;
    letter-spacing:0.2px;
  }
}

@media(max-width:480px){
  .presentacion{
    padding:5px 12px;
    margin:6px auto 12px;
    border-radius:8px;
  }
  
  .presentacion-inner h1{
    font-size:15px;
    letter-spacing:2px;
  }
  
  .presentacion-inner .frase{
    font-size:9px;
    letter-spacing:0px;
  }
}

/* ===== CATÁLOGO ===== */
.catalogo{
  width:92%;
  margin:auto;
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:26px;
  padding-bottom:90px;
}

.producto{
  cursor:pointer;
  position:relative;
  transition:transform .3s;
  background:#141414;
  border-radius:12px;
  padding:12px;
  border:1px solid #222;
}

.producto:hover{
  transform:translateY(-5px);
  border-color:#d4af37;
}

.producto img{
  width:100%;
  aspect-ratio:3/4;
  object-fit:cover;
  background:#1a1a1a;
  border-radius:8px;
  transition:.3s;
}

.producto h3{
  margin-top:10px;
  font-size:15px;
  font-weight:500;
  color:#e8e8e8;
}

.producto .precio-tarjeta{
  margin-top:6px;
  font-weight:700;
  font-size:18px;
  color:#d4af37;
}

.producto .precio-tarjeta .precio-original{
  color:#666;
  font-size:14px;
  text-decoration:line-through;
  margin-left:10px;
  font-weight:400;
}

.descuento{
  position:absolute;
  top:18px;
  left:18px;
  background:#d4af37;
  color:#0a0a0a;
  padding:4px 10px;
  border-radius:12px;
  font-size:12px;
  font-weight:700;
}

/* ===== MODAL ===== */
.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.95);
  z-index:1000;
  align-items:center;
  justify-content:center;
  padding:18px;
  animation:fadeIn .3s;
}

@keyframes fadeIn{
  from{opacity:0;transform:scale(.96)}
  to{opacity:1;transform:scale(1)}
}

.modal-content{
  background:#141414;
  width:95%;
  max-width:1180px;
  max-height:92vh;
  overflow:hidden;
  display:grid;
  grid-template-columns:1.05fr 1fr;
  gap:30px;
  padding:26px;
  border-radius:18px;
  position:relative;
  border:1px solid #222;
}

.cerrar{
  position:absolute;
  top:12px;
  right:18px;
  font-size:34px;
  background:none;
  color:#e8e8e8;
  border:none;
  cursor:pointer;
  z-index:5;
  transition:transform .3s;
}

.cerrar:hover{
  transform:rotate(90deg);
  color:#d4af37;
}

.foto-modal{
  position:sticky;
  top:20px;
  height:fit-content;
}

.foto-modal img{
  width:100%;
  max-height:78vh;
  aspect-ratio:3/4;
  object-fit:cover;
  background:#1a1a1a;
  padding:10px;
  border-radius:14px;
}

.flecha{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  width:42px;
  height:42px;
  border:none;
  border-radius:50%;
  background:rgba(0,0,0,.8);
  color:#e8e8e8;
  font-size:27px;
  cursor:pointer;
  transition:all .3s;
  border:1px solid #333;
}

.flecha:hover{
  background:#d4af37;
  color:#0a0a0a;
  border-color:#d4af37;
}

.flecha.izq{left:12px}
.flecha.der{right:12px}

/* ===== INFO MODAL ===== */
.info{
  overflow-y:auto;
  max-height:84vh;
  padding-right:8px;
  padding-bottom:110px;
}

.info h2{
  font-size:30px;
  margin-bottom:8px;
  font-weight:700;
  color:#e8e8e8;
}

.bloque{
  margin-top:20px;
}

.bloque h4{
  margin-bottom:10px;
  font-weight:600;
  color:#aaa;
}

.colores,.tallas{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.color-circulo{
  width:36px;
  height:36px;
  border-radius:50%;
  border:2px solid #444;
  cursor:pointer;
  position:relative;
  transition:all .3s;
}

.color-circulo:hover{
  transform:scale(1.1);
}

.color-circulo.activo{
  outline:3px solid #d4af37;
  outline-offset:2px;
}

.color-circulo.agotado::after{
  content:"";
  position:absolute;
  width:48px;
  height:2px;
  background:#ff5252;
  transform:rotate(-45deg);
  top:16px;
  left:-7px;
}

.talla-circulo{
  width:45px;
  height:45px;
  border-radius:50%;
  border:2px solid #444;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  background:#1a1a1a;
  position:relative;
  transition:all .3s;
  font-weight:600;
  color:#e8e8e8;
}

.talla-circulo:hover:not(.agotado){
  transform:scale(1.05);
  border-color:#d4af37;
}

.talla-circulo.activo{
  background:#d4af37;
  border-color:#d4af37;
  color:#0a0a0a;
  box-shadow:0 0 20px rgba(212,175,55,.2);
}

.talla-circulo.agotado{
  color:#555;
  cursor:not-allowed;
}

.talla-circulo.agotado::after{
  content:"";
  position:absolute;
  width:48px;
  height:2px;
  background:#ff5252;
  transform:rotate(-35deg);
}

.stock-disponible{
  font-size:13px;
  color:#aaa;
  margin-top:4px;
}

.estado{
  margin-top:14px;
  font-weight:bold;
}

.disponible{color:#4caf50}
.agotado-texto{color:#ff5252}

.cantidad{
  display:flex;
  align-items:center;
  gap:15px;
  margin-top:10px;
}

.cantidad button{
  width:36px;
  height:36px;
  border:1px solid #333;
  border-radius:50%;
  font-size:20px;
  cursor:pointer;
  background:#1a1a1a;
  color:#e8e8e8;
  transition:all .3s;
}

.cantidad button:hover{
  background:#d4af37;
  color:#0a0a0a;
  border-color:#d4af37;
}

.cantidad strong{
  font-size:20px;
  min-width:30px;
  text-align:center;
  color:#e8e8e8;
}

.detalles{
  margin-top:22px;
  color:#aaa;
  line-height:1.6;
}

.detalles h4{
  color:#ccc;
  margin-top:18px;
}

.detalles ul{
  padding-left:18px;
}

.tabla-medidas{
  margin-top:14px;
  width:100%;
  border-collapse:collapse;
  font-size:14px;
}

.tabla-medidas th,.tabla-medidas td{
  border:1px solid #333;
  padding:9px;
  text-align:center;
  color:#ccc;
}

.tabla-medidas th{
  background:#0a0a0a;
  color:#d4af37;
}

.medidas-nota{
  font-size:12px;
  color:#555;
  margin-top:8px;
}

/* ===== BARRA DE COMPRA ===== */
.barra-compra{
  background:#0a0a0a;
  border:1px solid #222;
  padding:18px;
  border-radius:14px;
  margin-top:25px;
}

.precio{
  font-size:26px;
  font-weight:800;
  margin-bottom:6px;
  color:#d4af37;
}

.precio .precio-descuento{
  color:#555;
  font-size:18px;
  text-decoration:line-through;
  margin-left:12px;
  font-weight:400;
}

.precio-unitario{
  color:#666;
  font-size:13px;
  margin-bottom:12px;
}

.btn-main{
  width:100%;
  padding:15px;
  background:#d4af37;
  color:#0a0a0a;
  border:none;
  border-radius:12px;
  font-size:16px;
  font-weight:700;
  cursor:pointer;
  transition:all .3s;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
}

.btn-main:hover:not(:disabled){
  transform:translateY(-2px);
  box-shadow:0 8px 25px rgba(212,175,55,.3);
  background:#c9a84c;
}

.btn-main:disabled{
  background:#222;
  color:#555;
  cursor:not-allowed;
  opacity:.6;
}

.btn-main.agotado-btn{
  background:#1a1a1a;
  color:#ff5252;
  border:1px solid #ff5252;
}

/* ===== CARRITO FLOTANTE ===== */
.carrito-flotante{
  position:fixed;
  right:18px;
  bottom:18px;
  width:64px;
  height:64px;
  border-radius:50%;
  background:#d4af37;
  color:#0a0a0a;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  z-index:999;
  font-size:25px;
  box-shadow:0 4px 18px rgba(212,175,55,.3);
  transition:all .3s;
}

.carrito-flotante:hover{
  transform:scale(1.05);
}

.carrito-contador{
  position:absolute;
  top:-5px;
  right:-5px;
  background:#ff5252;
  width:24px;
  height:24px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:12px;
  font-weight:bold;
  color:#fff;
}

/* ===== PANEL CARRITO ===== */
.carrito-panel{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.9);
  z-index:2500;
  justify-content:flex-end;
  animation:fadeIn .3s;
}

.carrito-box{
  width:420px;
  max-width:100%;
  height:100%;
  background:#0a0a0a;
  padding:24px;
  overflow-y:auto;
  position:relative;
  border-left:1px solid #222;
  animation:slideIn .3s;
}

@keyframes slideIn{
  from{transform:translateX(100%);opacity:0}
  to{transform:translateX(0);opacity:1}
}

.carrito-box h2{
  margin-bottom:20px;
  font-weight:700;
  color:#e8e8e8;
}

.item-carrito{
  display:grid;
  grid-template-columns:80px 1fr;
  gap:12px;
  border-bottom:1px solid #222;
  padding:14px 0;
}

.item-carrito img{
  width:80px;
  height:105px;
  object-fit:cover;
  background:#1a1a1a;
  border-radius:10px;
  padding:5px;
}

.item-carrito .item-info{
  display:flex;
  flex-direction:column;
  gap:4px;
}

.item-carrito .item-info strong{
  font-size:15px;
  color:#e8e8e8;
}

.item-carrito .item-info p{
  color:#888;
  font-size:13px;
  margin:0;
}

.eliminar{
  margin-top:6px;
  background:#1a1a1a;
  color:#e8e8e8;
  border:1px solid #333;
  padding:6px 12px;
  border-radius:8px;
  cursor:pointer;
  font-size:12px;
  transition:all .3s;
}

.eliminar:hover{
  background:#ff5252;
  border-color:#ff5252;
  color:#fff;
}

.resumen{
  margin-top:20px;
  border-top:1px solid #222;
  padding-top:15px;
}

.resumen p{
  margin:4px 0;
  font-size:14px;
  color:#aaa;
}

.resumen .descuento-line{
  color:#d4af37;
}

.resumen h3{
  font-size:22px;
  margin-top:8px;
  color:#d4af37;
}

/* ===== TOAST ===== */
.toast{
  position:fixed;
  left:50%;
  bottom:25px;
  transform:translateX(-50%) translateY(30px);
  background:#4caf50;
  color:#fff;
  padding:15px 25px;
  border-radius:30px;
  font-weight:600;
  opacity:0;
  pointer-events:none;
  z-index:4000;
  transition:.35s;
  display:flex;
  align-items:center;
  gap:10px;
  box-shadow:0 8px 30px rgba(76,175,80,.3);
}

.toast.mostrar{
  opacity:1;
  transform:translateX(-50%) translateY(0);
}

/* ===== RESPONSIVE ===== */
@media(max-width:900px){
  .catalogo{
    grid-template-columns:repeat(2,1fr);
    gap:16px;
  }

  .modal-content{
    grid-template-columns:1fr;
    overflow-y:auto;
    max-height:95vh;
  }

  .foto-modal{
    position:relative;
    top:auto;
  }

  .info{
    overflow:visible;
    max-height:none;
    padding-bottom:0;
  }

  .barra-compra{
    position:sticky;
    bottom:0;
    margin-top:20px;
    background:#0a0a0a;
    border:2px solid #d4af37;
    border-radius:14px;
    padding:18px;
  }
}

@media(max-width:480px){
  .header{
    height:75px;
    padding:0 5%;
  }

  .logo img{
    height:40px;
  }

  .redes a{
    font-size:11px;
    padding:5px 10px;
  }

  .catalogo{
    width:94%;
    grid-template-columns:repeat(2,1fr);
    gap:12px;
    padding-bottom:80px;
  }

  .producto h3{
    font-size:13px;
  }

  .producto .precio-tarjeta{
    font-size:15px;
  }

  .producto{
    padding:8px;
  }

  .modal{
    padding:0;
    align-items:flex-start;
  }

  .modal-content{
    width:100%;
    min-height:100vh;
    border-radius:0;
    padding:16px;
    padding-bottom:20px;
    max-height:none;
  }

  .info h2{
    font-size:24px;
  }

  .barra-compra{
    position:sticky;
    bottom:0;
    margin-top:20px;
    border-radius:12px;
    padding:14px;
  }

  .carrito-flotante{
    right:16px;
    bottom:80px;
    width:56px;
    height:56px;
    font-size:22px;
  }

  .carrito-box{
    width:100%;
    padding:18px;
  }

  .toast{
    bottom:150px;
    font-size:14px;
    padding:12px 18px;
  }

  .flecha{
    width:32px;
    height:32px;
    font-size:20px;
  }

  .flecha.izq{left:6px}
  .flecha.der{right:6px}
}
</style>
</head>

<body>

<header class="header">
  <div class="logo">
    <img src="https://i.postimg.cc/Vvt9Dv1K/logitobauvareeditable.jpg" alt="BAUVARE">
  </div>
  <div class="redes">
    <a href="https://www.instagram.com/" target="_blank">Instagram</a>
    <a href="https://www.tiktok.com/" target="_blank">TikTok</a>
  </div>
</header>

<!-- ===== PRESENTACIÓN ===== -->
<section class="presentacion">
  <div class="presentacion-inner">
    <h1>BAU<span>VARE</span></h1>
    <p class="frase">✦ No seguimos tendencias, construimos identidad ✦</p>
  </div>
</section>

<main class="catalogo" id="catalogo"></main>

<!-- ===== MODAL PRODUCTO ===== -->
<div class="modal" id="modal">
  <div class="modal-content">
    <button class="cerrar" onclick="cerrarModal()">×</button>

    <div class="foto-modal">
      <button class="flecha izq" onclick="cambiarFoto(-1)">‹</button>
      <img id="fotoPrincipal" src="" alt="Producto">
      <button class="flecha der" onclick="cambiarFoto(1)">›</button>
    </div>

    <div class="info">
      <h2 id="nombreProducto"></h2>

      <div class="bloque">
        <h4>Color</h4>
        <div class="colores" id="colores"></div>
      </div>

      <div class="bloque">
        <h4>Talla</h4>
        <div class="tallas" id="tallas"></div>
        <div class="stock-disponible" id="stockInfo"></div>
      </div>

      <p class="estado" id="estadoProducto"></p>

      <div class="bloque">
        <h4>Cantidad</h4>
        <div class="cantidad">
          <button onclick="cambiarCantidad(-1)">−</button>
          <strong id="cantidad">1</strong>
          <button onclick="cambiarCantidad(1)">+</button>
        </div>
      </div>

      <div class="detalles">
        <h4>Detalles de la prenda</h4>
        <ul id="detallesProducto"></ul>

        <h4>Recomendaciones</h4>
        <ul id="recomendacionesProducto"></ul>

        <h4>Tabla de medidas</h4>
        <p class="medidas-nota">Medidas en centímetros</p>
        <table class="tabla-medidas">
          <thead>
            <tr>
              <th>Talla</th>
              <th>Pecho</th>
              <th>Largo</th>
              <th>Manga</th>
            </tr>
          </thead>
          <tbody id="tablaMedidas"></tbody>
        </table>
      </div>

      <div class="barra-compra">
        <p class="precio" id="precioProducto"></p>
        <p class="precio-unitario" id="precioUnitario"></p>
        <button class="btn-main" id="btnAgregar" onclick="agregarAlCarrito()">
          Agregar al carrito
        </button>
      </div>
    </div>
  </div>
</div>

<!-- ===== CARRITO FLOTANTE ===== -->
<div class="carrito-flotante" onclick="abrirCarrito()">
  🛍️
  <span class="carrito-contador" id="contadorCarrito">0</span>
</div>

<!-- ===== PANEL CARRITO ===== -->
<div class="carrito-panel" id="carritoPanel">
  <div class="carrito-box">
    <button class="cerrar" onclick="cerrarCarrito()">×</button>
    <h2>Mi pedido</h2>
    <div id="itemsCarrito"></div>
    <div class="resumen" id="resumenCarrito"></div>
    <button class="btn-main" style="margin-top:18px;" onclick="pedirTodoWhatsApp()">
      Pedir todo por WhatsApp
    </button>
    <button class="btn-main" style="margin-top:10px;background:#1a1a1a;color:#888;" onclick="cerrarCarrito()">
      Seguir comprando
    </button>
  </div>
</div>

<!-- ===== TOAST ===== -->
<div class="toast" id="toast">Producto agregado al carrito</div>

<script>
/* ======================================================
   CONFIGURACIÓN
   ====================================================== */

const numeroWhatsApp = "51926677046";

const descuentoPorMayor = {
  desdeCantidad: 3,
  porcentaje: 10
};

/* ======================================================
   PRODUCTOS (8 PRODUCTOS)
   ====================================================== */

const productos = [
  {
    nombre:"Pantalón Cargo Negro",
    precio:89.90,
    descuento:10,
    colores:[
      {
        nombre:"Negro",
        codigo:"#1a1a1a",
        disponible:true,
        imagenes:[
          "https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?w=900",
          "https://images.unsplash.com/photo-1516762689617-e1cffcef479d?w=900"
        ],
        stock:{S:3,M:2,L:0,XL:1}
      },
      {
        nombre:"Gris",
        codigo:"#666666",
        disponible:true,
        imagenes:[
          "https://images.unsplash.com/photo-1523398002811-999ca8dec234?w=900",
          "https://images.unsplash.com/photo-1503341455253-b2e723bb3dbb?w=900"
        ],
        stock:{S:2,M:2,L:0,XL:0}
      }

/* ======================================================
   LÓGICA PRINCIPAL
   ====================================================== */

const catalogo = document.getElementById("catalogo");
let productoActual = null;
let colorActual = 0;
let tallaActual = "";
let fotoActual = 0;
let cantidadActual = 1;
let carrito = [];

// Renderizar catálogo
productos.forEach((p,index)=>{
  const precioConDescuento = p.descuento ? p.precio * (1 - p.descuento/100) : p.precio;
  
  catalogo.innerHTML += `
    <div class="producto" onclick="abrirModal(${index})">
      ${p.descuento ? `<span class="descuento">-${p.descuento}%</span>` : ""}
      <img src="${p.colores[0].imagenes[0]}" alt="${p.nombre}">
      <h3>${p.nombre}</h3>
      <div class="precio-tarjeta">
        S/ ${precioConDescuento.toFixed(2)}
        ${p.descuento ? `<span class="precio-original">S/ ${p.precio.toFixed(2)}</span>` : ""}
      </div>
    </div>
  `;
});

/* ===== ABRIR MODAL ===== */
function abrirModal(index){
  productoActual = productos[index];
  colorActual = 0;
  tallaActual = productoActual.tallas[0];
  fotoActual = 0;
  cantidadActual = 1;

  document.getElementById("nombreProducto").textContent = productoActual.nombre;
  document.getElementById("cantidad").textContent = cantidadActual;

  cargarTodo();
  document.getElementById("modal").style.display = "flex";
  document.body.style.overflow = "hidden";
}

function cerrarModal(){
  document.getElementById("modal").style.display = "none";
  document.body.style.overflow = "auto";
}

/* ===== CARGAR DATOS ===== */
function cargarTodo(){
  cargarFoto();
  cargarColores();
  cargarTallas();
  cargarDetalles();
  verificarStock();
  actualizarPrecio();
}

/* ===== FOTO ===== */
function cargarFoto(){
  const fotos = productoActual.colores[colorActual].imagenes;
  document.getElementById("fotoPrincipal").src = fotos[fotoActual];
}

function cambiarFoto(direccion){
  const fotosColor = productoActual.colores[colorActual].imagenes;

  fotoActual += direccion;

  if(fotoActual >= fotosColor.length){
    colorActual++;
    if(colorActual >= productoActual.colores.length) colorActual = 0;
    fotoActual = 0;
  }

  if(fotoActual < 0){
    colorActual--;
    if(colorActual < 0) colorActual = productoActual.colores.length - 1;
    fotoActual = productoActual.colores[colorActual].imagenes.length - 1;
  }

  cargarTodo();
}

/* ===== COLORES ===== */
function cargarColores(){
  document.getElementById("colores").innerHTML = productoActual.colores.map((c,i)=>`
    <div class="color-circulo ${i===colorActual ? "activo" : ""} ${!c.disponible ? "agotado" : ""}"
         title="${c.nombre}"
         onclick="seleccionarColor(${i})"
         style="background:${c.codigo}; ${c.codigo === '#f0f0f0' ? 'border-color:#666;' : ''}"></div>
  `).join("");
}

function seleccionarColor(i){
  colorActual = i;
  const color = productoActual.colores[colorActual];
  if(!color.stock[tallaActual] || color.stock[tallaActual] <= 0){
    const tallaConStock = productoActual.tallas.find(t => color.stock[t] && color.stock[t] > 0);
    tallaActual = tallaConStock || productoActual.tallas[0];
  }
  fotoActual = 0;
  cantidadActual = 1;
  document.getElementById("cantidad").textContent = cantidadActual;
  cargarTodo();
}

/* ===== TALLAS ===== */
function cargarTallas(){
  const color = productoActual.colores[colorActual];

  document.getElementById("tallas").innerHTML = productoActual.tallas.map(t=>{
    const agotado = !color.stock[t] || color.stock[t] <= 0;
    return `
      <div class="talla-circulo ${t===tallaActual && !agotado ? "activo" : ""} ${agotado ? "agotado" : ""}"
           onclick="seleccionarTalla('${t}')">${t}</div>
    `;
  }).join("");
}

function seleccionarTalla(t){
  const color = productoActual.colores[colorActual];
  if(color.stock[t] && color.stock[t] > 0){
    tallaActual = t;
    cantidadActual = 1;
    document.getElementById("cantidad").textContent = cantidadActual;
    cargarTodo();
  }
}

/* ===== STOCK ===== */
function verificarStock(){
  const color = productoActual.colores[colorActual];
  const stock = color.stock[tallaActual] || 0;
  const estado = document.getElementById("estadoProducto");
  const btn = document.getElementById("btnAgregar");
  const stockInfo = document.getElementById("stockInfo");

  if(stock > 0 && color.disponible){
    estado.textContent = "✓ Disponible";
    estado.className = "estado disponible";
    btn.disabled = false;
    btn.className = "btn-main";
    btn.innerHTML = "Agregar al carrito";
    stockInfo.textContent = `Quedan ${stock} unidades`;
  }else{
    estado.textContent = "✕ Agotado";
    estado.className = "estado agotado-texto";
    btn.disabled = true;
    btn.className = "btn-main agotado-btn";
    btn.innerHTML = "Agotado";
    stockInfo.textContent = "Sin stock disponible";
  }
}

/* ===== CANTIDAD ===== */
function cambiarCantidad(num){
  const color = productoActual.colores[colorActual];
  const stock = color.stock[tallaActual] || 0;

  cantidadActual += num;

  if(cantidadActual < 1) cantidadActual = 1;
  if(cantidadActual > stock) cantidadActual = stock;

  document.getElementById("cantidad").textContent = cantidadActual;
  actualizarPrecio();
}

/* ===== PRECIO ===== */
function actualizarPrecio(){
  const precioConDescuento = productoActual.descuento ? 
    productoActual.precio * (1 - productoActual.descuento/100) : 
    productoActual.precio;
  
  const total = precioConDescuento * cantidadActual;
  
  let precioHTML = `S/ ${total.toFixed(2)}`;
  if(productoActual.descuento){
    precioHTML += ` <span class="precio-descuento">S/ ${(productoActual.precio * cantidadActual).toFixed(2)}</span>`;
  }
  
  document.getElementById("precioProducto").innerHTML = precioHTML;
  document.getElementById("precioUnitario").textContent = `Precio unitario: S/ ${precioConDescuento.toFixed(2)}`;
}

/* ===== DETALLES ===== */
function cargarDetalles(){
  document.getElementById("detallesProducto").innerHTML =
    productoActual.detalles.map(d=>`<li>${d}</li>`).join("");

  document.getElementById("recomendacionesProducto").innerHTML =
    productoActual.recomendaciones.map(r=>`<li>${r}</li>`).join("");

  document.getElementById("tablaMedidas").innerHTML =
    productoActual.medidas.map(m=>`
      <tr>
        <td>${m[0]}</td>
        <td>${m[1]}</td>
        <td>${m[2]}</td>
        <td>${m[3]}</td>
      </tr>
    `).join("");
}

/* ===== CARRITO ===== */
function agregarAlCarrito(){
  const color = productoActual.colores[colorActual];
  const precioConDescuento = productoActual.descuento ? 
    productoActual.precio * (1 - productoActual.descuento/100) : 
    productoActual.precio;

  const item = {
    nombre: productoActual.nombre,
    color: color.nombre,
    talla: tallaActual,
    cantidad: cantidadActual,
    precio: precioConDescuento,
    foto: color.imagenes[0]
  };

  carrito.push(item);
  actualizarCarrito();
  mostrarToast("Producto agregado al carrito");

  cantidadActual = 1;
  document.getElementById("cantidad").textContent = cantidadActual;
  actualizarPrecio();
}

function mostrarToast(mensaje){
  const toast = document.getElementById("toast");
  toast.textContent = "✓ " + mensaje;
  toast.classList.add("mostrar");

  setTimeout(()=>{
    toast.classList.remove("mostrar");
  },2000);
}

function actualizarCarrito(){
  const totalItems = carrito.reduce((sum,item)=>sum + item.cantidad,0);
  document.getElementById("contadorCarrito").textContent = totalItems;
}

/* ===== ABRIR CARRITO ===== */
function abrirCarrito(){
  document.getElementById("carritoPanel").style.display = "flex";
  document.body.style.overflow = "hidden";
  renderCarrito();
}

function cerrarCarrito(){
  document.getElementById("carritoPanel").style.display = "none";
  document.body.style.overflow = "auto";
}

/* ===== RENDER CARRITO ===== */
function renderCarrito(){
  const contenedor = document.getElementById("itemsCarrito");
  const resumen = document.getElementById("resumenCarrito");

  if(carrito.length === 0){
    contenedor.innerHTML = "<p style='color:#555;text-align:center;padding:30px 0;'>Tu carrito está vacío</p>";
    resumen.innerHTML = "";
    return;
  }

  contenedor.innerHTML = carrito.map((item,index)=>`
    <div class="item-carrito">
      <img src="${item.foto}" alt="${item.nombre}">
      <div class="item-info">
        <strong>${item.nombre}</strong>
        <p>${item.color}</p>
        <p>Talla: ${item.talla}</p>
        <p>Cantidad: ${item.cantidad}</p>
        <p style="color:#d4af37;font-weight:600;">S/ ${(item.precio * item.cantidad).toFixed(2)}</p>
        <button class="eliminar" onclick="eliminarItem(${index})">Eliminar</button>
      </div>
    </div>
  `).join("");

  const cantidadTotal = carrito.reduce((sum,item)=>sum + item.cantidad,0);
  const subtotal = carrito.reduce((sum,item)=>sum + (item.precio * item.cantidad),0);

  let descuento = 0;
  if(cantidadTotal >= descuentoPorMayor.desdeCantidad){
    descuento = subtotal * descuentoPorMayor.porcentaje / 100;
  }

  const total = subtotal - descuento;

  resumen.innerHTML = `
    <p>Prendas: ${cantidadTotal}</p>
    <p>Subtotal: S/ ${subtotal.toFixed(2)}</p>
    ${descuento > 0 ? `<p class="descuento-line">Descuento por ${descuentoPorMayor.desdeCantidad}+ prendas: -S/ ${descuento.toFixed(2)}</p>` : `<p style="color:#555;font-size:13px;">Lleva ${descuentoPorMayor.desdeCantidad} prendas y obtén ${descuentoPorMayor.porcentaje}% de descuento</p>`}
    <h3>Total: S/ ${total.toFixed(2)}</h3>
  `;
}

function eliminarItem(index){
  carrito.splice(index,1);
  actualizarCarrito();
  renderCarrito();
}

function pedirTodoWhatsApp(){
  if(carrito.length === 0) return;

  const cantidadTotal = carrito.reduce((sum,item)=>sum + item.cantidad,0);
  const subtotal = carrito.reduce((sum,item)=>sum + (item.precio * item.cantidad),0);

  if(cantidadTotal >= descuentoPorMayor.desdeCantidad){

  const detalle = carrito.map((item,index)=>`

/* ===== CIERRE MODAL CLICK EXTERNO ===== */
window.onclick = function(e){
  if(e.target === document.getElementById("modal")){
    cerrarModal();
  }

  if(e.target === document.getElementById("carritoPanel")){
    cerrarCarrito();
  }
