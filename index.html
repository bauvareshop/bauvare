<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BAUVARE | Catálogo</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:Arial,sans-serif;
  background:#242424;
  color:white;
}

.header{
  height:82px;
  background:#151515;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 6%;
  position:sticky;
  top:0;
  z-index:100;
  border-bottom:1px solid #333;
}

.logo{
  font-size:30px;
  font-weight:bold;
  letter-spacing:7px;
}

.redes{
  display:flex;
  gap:12px;
}

.redes a{
  color:white;
  text-decoration:none;
  font-size:14px;
  border:1px solid #555;
  padding:8px 12px;
  border-radius:20px;
}

.banner-logo{
  width:92%;
  margin:30px auto 20px;
  min-height:150px;
  background:#1b1b1b;
  border-radius:16px;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#777;
  border:1px dashed #555;
  text-align:center;
  padding:20px;
}

.catalogo{
  width:92%;
  margin:auto;
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:26px;
  padding-bottom:90px;
}

.producto{
  cursor:pointer;
  position:relative;
}

.producto img{
  width:100%;
  aspect-ratio:3/4;
  object-fit:contain;
  background:#2b2b2b;
  padding:8px;
  border-radius:12px;
  transition:.3s;
}

.producto:hover img{
  transform:scale(1.02);
}

.producto h3{
  margin-top:10px;
  font-size:16px;
  font-weight:500;
}

.producto p{
  margin-top:6px;
  font-weight:bold;
}

.descuento{
  position:absolute;
  top:10px;
  left:10px;
  background:#b97686;
  padding:6px 11px;
  border-radius:18px;
  font-size:13px;
}

.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.88);
  z-index:1000;
  align-items:center;
  justify-content:center;
  padding:18px;
}

.modal-content{
  background:#2b2b2b;
  width:95%;
  max-width:1180px;
  max-height:92vh;
  overflow:hidden;
  display:grid;
  grid-template-columns:1.05fr 1fr;
  gap:30px;
  padding:26px;
  border-radius:18px;
  position:relative;
}

.cerrar{
  position:absolute;
  top:12px;
  right:18px;
  font-size:34px;
  background:none;
  color:white;
  border:none;
  cursor:pointer;
  z-index:5;
}

.foto-modal{
  position:sticky;
  top:20px;
  height:fit-content;
}

.foto-modal img{
  width:100%;
  max-height:78vh;
  aspect-ratio:3/4;
  object-fit:contain;
  background:#2b2b2b;
  padding:10px;
  border-radius:14px;
}

.flecha{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  width:42px;
  height:42px;
  border:none;
  border-radius:50%;
  background:rgba(0,0,0,.55);
  color:white;
  font-size:27px;
  cursor:pointer;
}

.flecha.izq{left:12px}
.flecha.der{right:12px}

.info{
  overflow-y:auto;
  max-height:84vh;
  padding-right:8px;
  padding-bottom:110px;
}

.info h2{
  font-size:30px;
  margin-bottom:8px;
}

.bloque{
  margin-top:20px;
}

.bloque h4{
  margin-bottom:10px;
}

.colores,.tallas{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.color-circulo{
  width:36px;
  height:36px;
  border-radius:50%;
  border:2px solid #777;
  cursor:pointer;
  position:relative;
}

.color-circulo.activo{
  outline:3px solid white;
}

.color-circulo.agotado::after{
  content:"";
  position:absolute;
  width:48px;
  height:2px;
  background:red;
  transform:rotate(-45deg);
  top:16px;
  left:-7px;
}

.talla-circulo{
  width:45px;
  height:45px;
  border-radius:50%;
  border:1px solid #777;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  background:#1d1d1d;
  position:relative;
}

.talla-circulo.activo{
  background:#b97686;
  border-color:#b97686;
}

.talla-circulo.agotado{
  color:#888;
}

.talla-circulo.agotado::after{
  content:"";
  position:absolute;
  width:48px;
  height:2px;
  background:red;
  transform:rotate(-35deg);
}

.estado{
  margin-top:14px;
  font-weight:bold;
}

.disponible{color:#00e676}
.agotado-texto{color:#ff5252}

.cantidad{
  display:flex;
  align-items:center;
  gap:15px;
  margin-top:10px;
}

.cantidad button{
  width:36px;
  height:36px;
  border:none;
  border-radius:50%;
  font-size:20px;
  cursor:pointer;
}

.detalles{
  margin-top:22px;
  color:#ddd;
  line-height:1.6;
}

.detalles ul{
  padding-left:18px;
}

.tabla-medidas{
  margin-top:14px;
  width:100%;
  border-collapse:collapse;
  font-size:14px;
}

.tabla-medidas th,.tabla-medidas td{
  border:1px solid #555;
  padding:9px;
  text-align:center;
}

.tabla-medidas th{
  background:#1b1b1b;
}

.barra-compra{
  position:relative;
  background:#1a1a1a;
  border:1px solid #444;
  padding:14px;
  border-radius:14px;
  margin-top:25px;
}

.precio{
  font-size:24px;
  font-weight:bold;
  margin-bottom:10px;
}

.precio-unitario{
  color:#aaa;
  font-size:13px;
  margin-bottom:10px;
}

.btn-main{
  width:100%;
  padding:15px;
  background:#b97686;
  color:white;
  border:none;
  border-radius:12px;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
}

.btn-main:disabled{
  background:#555;
  cursor:not-allowed;
}

/* CARRITO FLOTANTE ABAJO DERECHA */
.carrito-flotante{
  position:fixed;
  right:18px;
  bottom:18px;
  width:64px;
  height:64px;
  border-radius:50%;
  background:#b97686;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  z-index:999;
  font-size:25px;
  box-shadow:0 4px 18px rgba(0,0,0,.45);
}

.carrito-contador{
  position:absolute;
  top:-5px;
  right:-5px;
  background:red;
  width:24px;
  height:24px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:12px;
  font-weight:bold;
}

.carrito-panel{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.75);
  z-index:2500;
  justify-content:flex-end;
}

.carrito-box{
  width:410px;
  max-width:100%;
  height:100%;
  background:#242424;
  padding:24px;
  overflow-y:auto;
  position:relative;
}

.carrito-box h2{
  margin-bottom:20px;
}

.item-carrito{
  display:grid;
  grid-template-columns:80px 1fr;
  gap:12px;
  border-bottom:1px solid #444;
  padding:14px 0;
}

.item-carrito img{
  width:80px;
  height:105px;
  object-fit:contain;
  background:#333;
  border-radius:10px;
  padding:5px;
}

.item-carrito p{
  color:#ccc;
  margin-top:4px;
  font-size:14px;
}

.eliminar{
  margin-top:8px;
  background:#444;
  color:white;
  border:none;
  padding:7px 10px;
  border-radius:8px;
  cursor:pointer;
}

.resumen{
  margin-top:20px;
  border-top:1px solid #555;
  padding-top:15px;
}

/* ANIMACIÓN AGREGADO */
.toast{
  position:fixed;
  left:50%;
  bottom:25px;
  transform:translateX(-50%) translateY(30px);
  background:#00a86b;
  color:white;
  padding:13px 20px;
  border-radius:30px;
  font-weight:bold;
  opacity:0;
  pointer-events:none;
  z-index:4000;
  transition:.35s;
}

.toast.mostrar{
  opacity:1;
  transform:translateX(-50%) translateY(0);
}

@media(max-width:900px){
  .catalogo{
    grid-template-columns:repeat(2,1fr);
    gap:16px;
  }

  .modal-content{
    grid-template-columns:1fr;
    overflow-y:auto;
  }

  .foto-modal{
    position:relative;
    top:auto;
  }

  .info{
    overflow:visible;
    max-height:none;
  }
}

@media(max-width:480px){
  .header{
    height:75px;
    padding:0 5%;
  }

  .logo{
    font-size:22px;
    letter-spacing:4px;
  }

  .redes a{
    font-size:12px;
    padding:6px 9px;
  }

  .banner-logo{
    width:94%;
    min-height:125px;
  }

  .catalogo{
    width:94%;
    grid-template-columns:repeat(2,1fr);
    gap:14px;
  }

  .producto h3,.producto p{
    font-size:14px;
  }

  .modal{
    padding:0;
    align-items:flex-start;
  }

  .modal-content{
    width:100%;
    min-height:100vh;
    border-radius:0;
    padding:18px;
    padding-bottom:130px;
  }

 .barra-compra{
  position:relative;
  border-radius:14px;
  margin-top:25px;
  padding:14px;
}

  .carrito-flotante{
    right:16px;
    bottom:82px;
    width:58px;
    height:58px;
  }

  .toast{
    bottom:155px;
    font-size:14px;
  }
}
</style>
</head>

<body>

<header class="header">
  <div class="logo">BAUVARE</div>
  <div class="redes">
    <a href="https://www.instagram.com/" target="_blank">Instagram</a>
    <a href="https://www.tiktok.com/" target="_blank">TikTok</a>
  </div>
</header>

<section class="banner-logo">
  Aquí irá tu imagen principal o logo de BAUVARE
</section>

<main class="catalogo" id="catalogo"></main>

<div class="modal" id="modal">
  <div class="modal-content">
    <button class="cerrar" onclick="cerrarModal()">×</button>

    <div class="foto-modal">
      <button class="flecha izq" onclick="cambiarFoto(-1)">‹</button>
      <img id="fotoPrincipal" src="">
      <button class="flecha der" onclick="cambiarFoto(1)">›</button>
    </div>

    <div class="info">
      <h2 id="nombreProducto"></h2>

      <div class="bloque">
        <h4>Color</h4>
        <div class="colores" id="colores"></div>
      </div>

      <div class="bloque">
        <h4>Talla</h4>
        <div class="tallas" id="tallas"></div>
      </div>

      <p class="estado" id="estadoProducto"></p>

      <div class="bloque">
        <h4>Cantidad</h4>
        <div class="cantidad">
          <button onclick="cambiarCantidad(-1)">−</button>
          <strong id="cantidad">1</strong>
          <button onclick="cambiarCantidad(1)">+</button>
        </div>
      </div>

      <div class="detalles">
        <h4>Detalles de la prenda</h4>
        <ul id="detallesProducto"></ul>

        <h4 style="margin-top:18px;">Recomendaciones</h4>
        <ul id="recomendacionesProducto"></ul>

        <h4 style="margin-top:18px;">Tabla de medidas</h4>
        <table class="tabla-medidas">
          <thead>
            <tr>
              <th>Talla</th>
              <th>Pecho</th>
              <th>Largo</th>
              <th>Manga</th>
            </tr>
          </thead>
          <tbody id="tablaMedidas"></tbody>
        </table>
      </div>

      <div class="barra-compra">
        <p class="precio" id="precioProducto"></p>
        <p class="precio-unitario" id="precioUnitario"></p>
        <button class="btn-main" id="btnAgregar" onclick="agregarAlCarrito()">Agregar al carrito</button>
      </div>
    </div>
  </div>
</div>

<div class="carrito-flotante" onclick="abrirCarrito()">
  🛍️
  <span class="carrito-contador" id="contadorCarrito">0</span>
</div>

<div class="carrito-panel" id="carritoPanel">
  <div class="carrito-box">
    <button class="cerrar" onclick="cerrarCarrito()">×</button>
    <h2>Mi pedido</h2>
    <div id="itemsCarrito"></div>
    <div class="resumen" id="resumenCarrito"></div>
    <button class="btn-main" style="margin-top:18px;" onclick="pedirTodoWhatsApp()">Pedir todo por WhatsApp</button>
  </div>
</div>

<div class="toast" id="toast">Producto agregado al carrito</div>

<script>
/* ======================================================
   ZONA EDITABLE: PRODUCTOS, STOCK, COLORES Y PROMOCIÓN
   ====================================================== */

const numeroWhatsApp = "51999999999";

const descuentoPorMayor = {
  desdeCantidad: 3,
  porcentaje: 10
};

const productos = [
  {
    nombre:"Pantalón Cargo",
    precio:89.90,
    descuento:10,
    colores:[
      {
        nombre:"Negro",
        codigo:"#000000",
        disponible:true,
        imagenes:[
          "https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?w=900",
          "https://images.unsplash.com/photo-1516762689617-e1cffcef479d?w=900"
        ],
        stock:{S:3,M:2,L:0,XL:1}
      },
      {
        nombre:"Blanco",
        codigo:"#ffffff",
        disponible:true,
        imagenes:[
          "https://images.unsplash.com/photo-1523398002811-999ca8dec234?w=900",
          "https://images.unsplash.com/photo-1503341455253-b2e723bb3dbb?w=900"
        ],
        stock:{S:2,M:2,L:0,XL:0}
      }
    ],
    tallas:["S","M","L","XL"],
    detalles:["Tela resistente y cómoda","Fit urbano formal","Bolsillos laterales funcionales"],
    recomendaciones:["Lavar con agua fría","No usar lejía","Planchar a temperatura baja"],
    medidas:[
      ["S","92 cm","98 cm","60 cm"],
      ["M","96 cm","100 cm","61 cm"],
      ["L","100 cm","102 cm","62 cm"],
      ["XL","104 cm","104 cm","63 cm"]
    ]
  },
  {
    nombre:"Polo Oversize",
    precio:59.90,
    descuento:0,
    colores:[
      {
        nombre:"Blanco",
        codigo:"#ffffff",
        disponible:true,
        imagenes:[
          "https://images.unsplash.com/photo-1523398002811-999ca8dec234?w=900",
          "https://images.unsplash.com/photo-1503341455253-b2e723bb3dbb?w=900"
        ],
        stock:{S:2,M:3,L:0}
      },
      {
        nombre:"Negro",
        codigo:"#000000",
        disponible:true,
        imagenes:[
          "https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?w=900",
          "https://images.unsplash.com/photo-1516762689617-e1cffcef479d?w=900"
        ],
        stock:{S:0,M:1,L:1}
      }
    ],
    tallas:["S","M","L"],
    detalles:["Corte oversize","Algodón suave","Ideal para outfit urbano"],
    recomendaciones:["Lavar al revés","Secar bajo sombra","No exprimir"],
    medidas:[
      ["S","98 cm","70 cm","22 cm"],
      ["M","104 cm","72 cm","23 cm"],
      ["L","110 cm","74 cm","24 cm"]
    ]
  }
];

/* ======================================================
   FIN DE ZONA EDITABLE
   ====================================================== */

const catalogo = document.getElementById("catalogo");
let productoActual = null;
let colorActual = 0;
let tallaActual = "";
let fotoActual = 0;
let cantidadActual = 1;
let carrito = [];

productos.forEach((p,index)=>{
  catalogo.innerHTML += `
    <div class="producto" onclick="abrirModal(${index})">
      ${p.descuento ? `<span class="descuento">-${p.descuento}%</span>` : ""}
      <img src="${p.colores[0].imagenes[0]}" alt="${p.nombre}">
      <h3>${p.nombre}</h3>
      <p>S/ ${p.precio.toFixed(2)}</p>
    </div>
  `;
});

function abrirModal(index){
  productoActual = productos[index];
  colorActual = 0;
  tallaActual = productoActual.tallas[0];
  fotoActual = 0;
  cantidadActual = 1;

  document.getElementById("nombreProducto").textContent = productoActual.nombre;
  document.getElementById("cantidad").textContent = cantidadActual;

  cargarTodo();
  document.getElementById("modal").style.display = "flex";
}

function cargarTodo(){
  cargarFoto();
  cargarColores();
  cargarTallas();
  cargarDetalles();
  verificarStock();
  actualizarPrecio();
}

function cargarFoto(){
  const fotos = productoActual.colores[colorActual].imagenes;
  document.getElementById("fotoPrincipal").src = fotos[fotoActual];
}

function cambiarFoto(direccion){
  const fotosColor = productoActual.colores[colorActual].imagenes;

  fotoActual += direccion;

  if(fotoActual >= fotosColor.length){
    colorActual++;
    if(colorActual >= productoActual.colores.length) colorActual = 0;
    fotoActual = 0;
  }

  if(fotoActual < 0){
    colorActual--;
    if(colorActual < 0) colorActual = productoActual.colores.length - 1;
    fotoActual = productoActual.colores[colorActual].imagenes.length - 1;
  }

  cargarTodo();
}

function cargarColores(){
  document.getElementById("colores").innerHTML = productoActual.colores.map((c,i)=>`
    <div class="color-circulo ${i===colorActual ? "activo" : ""} ${!c.disponible ? "agotado" : ""}"
         title="${c.nombre}"
         onclick="seleccionarColor(${i})"
         style="background:${c.codigo}"></div>
  `).join("");
}

function seleccionarColor(i){
  colorActual = i;
  fotoActual = 0;
  cantidadActual = 1;
  document.getElementById("cantidad").textContent = cantidadActual;
  cargarTodo();
}

function cargarTallas(){
  const color = productoActual.colores[colorActual];

  document.getElementById("tallas").innerHTML = productoActual.tallas.map(t=>{
    const agotado = !color.stock[t] || color.stock[t] <= 0;
    return `
      <div class="talla-circulo ${t===tallaActual ? "activo" : ""} ${agotado ? "agotado" : ""}"
           onclick="seleccionarTalla('${t}')">${t}</div>
    `;
  }).join("");
}

function seleccionarTalla(t){
  tallaActual = t;
  cantidadActual = 1;
  document.getElementById("cantidad").textContent = cantidadActual;
  cargarTodo();
}

function verificarStock(){
  const color = productoActual.colores[colorActual];
  const stock = color.stock[tallaActual] || 0;
  const estado = document.getElementById("estadoProducto");
  const btn = document.getElementById("btnAgregar");

  if(stock > 0 && color.disponible){
    estado.textContent = "Disponible";
    estado.className = "estado disponible";
    btn.disabled = false;
  }else{
    estado.textContent = "Agotado";
    estado.className = "estado agotado-texto";
    btn.disabled = true;
  }
}

function cambiarCantidad(num){
  const color = productoActual.colores[colorActual];
  const stock = color.stock[tallaActual] || 0;

  cantidadActual += num;

  if(cantidadActual < 1) cantidadActual = 1;
  if(cantidadActual > stock) cantidadActual = stock;

  document.getElementById("cantidad").textContent = cantidadActual;
  actualizarPrecio();
}

function actualizarPrecio(){
  const total = productoActual.precio * cantidadActual;
  document.getElementById("precioProducto").textContent = `Subtotal: S/ ${total.toFixed(2)}`;
  document.getElementById("precioUnitario").textContent = `Precio unitario: S/ ${productoActual.precio.toFixed(2)}`;
}

function cargarDetalles(){
  document.getElementById("detallesProducto").innerHTML =
    productoActual.detalles.map(d=>`<li>${d}</li>`).join("");

  document.getElementById("recomendacionesProducto").innerHTML =
    productoActual.recomendaciones.map(r=>`<li>${r}</li>`).join("");

  document.getElementById("tablaMedidas").innerHTML =
    productoActual.medidas.map(m=>`
      <tr>
        <td>${m[0]}</td>
        <td>${m[1]}</td>
        <td>${m[2]}</td>
        <td>${m[3]}</td>
      </tr>
    `).join("");
}

function agregarAlCarrito(){
  const color = productoActual.colores[colorActual];

  const item = {
    nombre: productoActual.nombre,
    color: color.nombre,
    talla: tallaActual,
    cantidad: cantidadActual,
    precio: productoActual.precio,
    foto: color.imagenes[0]
  };

  carrito.push(item);
  actualizarCarrito();
  mostrarToast();

  cantidadActual = 1;
  document.getElementById("cantidad").textContent = cantidadActual;
  actualizarPrecio();
}

function mostrarToast(){
  const toast = document.getElementById("toast");
  toast.classList.add("mostrar");

  setTimeout(()=>{
    toast.classList.remove("mostrar");
  },1600);
}

function actualizarCarrito(){
  const totalItems = carrito.reduce((sum,item)=>sum + item.cantidad,0);
  document.getElementById("contadorCarrito").textContent = totalItems;
}

function abrirCarrito(){
  document.getElementById("carritoPanel").style.display = "flex";
  renderCarrito();
}

function cerrarCarrito(){
  document.getElementById("carritoPanel").style.display = "none";
}

function renderCarrito(){
  const contenedor = document.getElementById("itemsCarrito");
  const resumen = document.getElementById("resumenCarrito");

  if(carrito.length === 0){
    contenedor.innerHTML = "<p>Tu carrito está vacío.</p>";
    resumen.innerHTML = "";
    return;
  }

  contenedor.innerHTML = carrito.map((item,index)=>`
    <div class="item-carrito">
      <img src="${item.foto}" alt="${item.nombre}">
      <div>
        <strong>${item.nombre}</strong>
        <p>Color: ${item.color}</p>
        <p>Talla: ${item.talla}</p>
        <p>Cantidad: ${item.cantidad}</p>
        <p>Precio unitario: S/ ${item.precio.toFixed(2)}</p>
        <p>Subtotal: S/ ${(item.precio * item.cantidad).toFixed(2)}</p>
        <button class="eliminar" onclick="eliminarItem(${index})">Eliminar</button>
      </div>
    </div>
  `).join("");

  const cantidadTotal = carrito.reduce((sum,item)=>sum + item.cantidad,0);
  const subtotal = carrito.reduce((sum,item)=>sum + (item.precio * item.cantidad),0);

  let descuento = 0;
  if(cantidadTotal >= descuentoPorMayor.desdeCantidad){
    descuento = subtotal * descuentoPorMayor.porcentaje / 100;
  }

  const total = subtotal - descuento;

  resumen.innerHTML = `
    <p>Prendas: ${cantidadTotal}</p>
    <p>Subtotal: S/ ${subtotal.toFixed(2)}</p>
    <p>Descuento: S/ ${descuento.toFixed(2)}</p>
    <h3>Total: S/ ${total.toFixed(2)}</h3>
  `;
}

function eliminarItem(index){
  carrito.splice(index,1);
  actualizarCarrito();
  renderCarrito();
}

function pedirTodoWhatsApp(){
  if(carrito.length === 0) return;

  const cantidadTotal = carrito.reduce((sum,item)=>sum + item.cantidad,0);
  const subtotal = carrito.reduce((sum,item)=>sum + (item.precio * item.cantidad),0);

  let descuento = 0;
  if(cantidadTotal >= descuentoPorMayor.desdeCantidad){
    descuento = subtotal * descuentoPorMayor.porcentaje / 100;
  }

  const total = subtotal - descuento;

  const detalle = carrito.map((item,index)=>`
${index + 1}. ${item.nombre}
Color: ${item.color}
Talla: ${item.talla}
Cantidad: ${item.cantidad}
Precio unitario: S/ ${item.precio.toFixed(2)}
Subtotal: S/ ${(item.precio * item.cantidad).toFixed(2)}
`).join("");

  const mensaje = `Hola BAUVARE, quiero realizar este pedido:

${detalle}
Prendas: ${cantidadTotal}
Subtotal: S/ ${subtotal.toFixed(2)}
Descuento: S/ ${descuento.toFixed(2)}
Total: S/ ${total.toFixed(2)}`;

  window.open(`https://wa.me/${numeroWhatsApp}?text=${encodeURIComponent(mensaje)}`, "_blank");
}

function cerrarModal(){
  document.getElementById("modal").style.display = "none";
}

window.onclick = function(e){
  if(e.target === document.getElementById("modal")){
    cerrarModal();
  }

  if(e.target === document.getElementById("carritoPanel")){
    cerrarCarrito();
  }
}
</script>
