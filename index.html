<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BAUVARE | Catálogo</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:Arial,sans-serif;
  background:#1f1f1f;
  color:white;
}

.header{
  height:85px;
  background:#111;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 6%;
  position:sticky;
  top:0;
  z-index:100;
  border-bottom:1px solid #333;
}

.logo{
  font-size:30px;
  font-weight:bold;
  letter-spacing:6px;
}

.nav a{
  color:white;
  text-decoration:none;
  margin:0 18px;
}

.carrito{font-size:22px}

.banner{
  width:92%;
  margin:30px auto;
  background:#2b2b2b;
  padding:30px;
  border-radius:14px;
}

.catalogo{
  width:92%;
  margin:auto;
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:28px;
  padding-bottom:60px;
}

.producto{
  position:relative;
  cursor:pointer;
  transition:.3s;
}

.producto:hover{transform:translateY(-6px)}

.producto img{
  width:100%;
  aspect-ratio:3/4;
  object-fit:cover;
  border-radius:14px;
  background:#333;
}

.producto h3{
  margin-top:12px;
  font-size:17px;
}

.producto p{
  margin-top:7px;
  font-weight:bold;
}

.descuento{
  position:absolute;
  top:12px;
  left:12px;
  background:#b97686;
  padding:6px 12px;
  border-radius:20px;
  font-size:14px;
}

.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.88);
  z-index:1000;
  align-items:center;
  justify-content:center;
  padding:20px;
}

.modal-content{
  background:#2b2b2b;
  color:white;
  width:95%;
  max-width:1200px;
  max-height:92vh;
  overflow-y:auto;
  display:grid;
  grid-template-columns:1.25fr 1fr;
  gap:35px;
  padding:30px;
  border-radius:18px;
  position:relative;
}

.cerrar{
  position:absolute;
  top:12px;
  right:18px;
  font-size:34px;
  background:none;
  color:white;
  border:none;
  cursor:pointer;
}

.foto-modal{
  position:relative;
}

.foto-modal img{
  width:100%;
  aspect-ratio:3/4;
  object-fit:cover;
  border-radius:14px;
  background:#333;
}

.flecha{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  width:44px;
  height:44px;
  border:none;
  border-radius:50%;
  background:rgba(0,0,0,.55);
  color:white;
  font-size:28px;
  cursor:pointer;
}

.flecha.izq{left:12px}
.flecha.der{right:12px}

.info h2{
  font-size:32px;
  margin-bottom:10px;
}

.precio{
  font-size:24px;
  font-weight:bold;
  margin-bottom:20px;
}

.bloque{margin-top:22px}

.bloque h4{
  margin-bottom:10px;
  font-size:16px;
}

.colores,.tallas{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.color-circulo{
  width:36px;
  height:36px;
  border-radius:50%;
  border:2px solid #777;
  cursor:pointer;
  position:relative;
}

.color-circulo.activo{
  outline:3px solid white;
}

.color-circulo.agotado::after{
  content:"";
  position:absolute;
  width:46px;
  height:2px;
  background:red;
  transform:rotate(-45deg);
  top:16px;
  left:-6px;
}

.talla-circulo{
  width:44px;
  height:44px;
  border-radius:50%;
  border:1px solid #777;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  background:#1d1d1d;
  position:relative;
}

.talla-circulo.activo{
  background:#b97686;
  border-color:#b97686;
}

.talla-circulo.agotado{
  color:#888;
}

.talla-circulo.agotado::after{
  content:"";
  position:absolute;
  width:48px;
  height:2px;
  background:red;
  transform:rotate(-35deg);
}

.estado{
  margin-top:15px;
  font-weight:bold;
}

.disponible{color:#00e676}
.agotado-texto{color:#ff5252}

.cantidad{
  display:flex;
  align-items:center;
  gap:15px;
  margin-top:12px;
}

.cantidad button{
  width:36px;
  height:36px;
  border-radius:50%;
  border:none;
  font-size:20px;
  cursor:pointer;
}

.detalles{
  margin-top:25px;
  color:#ddd;
  line-height:1.6;
  padding-bottom:100px;
}

.detalles ul{
  padding-left:18px;
}

.tabla-medidas{
  margin-top:18px;
  width:100%;
  border-collapse:collapse;
  font-size:14px;
}

.tabla-medidas th,.tabla-medidas td{
  border:1px solid #555;
  padding:9px;
  text-align:center;
}

.tabla-medidas th{
  background:#1b1b1b;
}

.barra-compra{
  margin-top:25px;
}

.btn-wsp{
  width:100%;
  padding:16px;
  background:#b97686;
  color:white;
  border:none;
  border-radius:12px;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
}

.btn-wsp:disabled{
  background:#555;
  cursor:not-allowed;
}

.wsp{
  position:fixed;
  right:25px;
  bottom:25px;
  width:58px;
  height:58px;
  background:#25D366;
  color:white;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  text-decoration:none;
  font-size:26px;
  z-index:999;
}

@media(max-width:900px){
  .catalogo{
    grid-template-columns:repeat(2,1fr);
    gap:18px;
  }

  .nav{display:none}

  .modal-content{
    grid-template-columns:1fr;
  }
}

@media(max-width:480px){
  .header{
    height:75px;
    padding:0 5%;
  }

  .logo{
    font-size:22px;
    letter-spacing:4px;
  }

  .banner{
    width:94%;
    padding:20px;
  }

  .catalogo{
    width:94%;
    grid-template-columns:repeat(2,1fr);
    gap:14px;
  }

  .producto h3,.producto p{
    font-size:14px;
  }

  .modal{
    padding:0;
    align-items:flex-start;
  }

  .modal-content{
    width:100%;
    min-height:100vh;
    border-radius:0;
    padding:18px;
    padding-bottom:120px;
  }

  .barra-compra{
    position:fixed;
    left:0;
    right:0;
    bottom:0;
    background:#1b1b1b;
    padding:14px 18px;
    border-top:1px solid #444;
    z-index:2000;
  }

  .barra-compra .precio{
    margin-bottom:10px;
    font-size:20px;
  }

  .wsp{
    display:none;
  }
}
</style>
</head>

<body>

<header class="header">
  <div class="logo">BAUVARE</div>
  <nav class="nav">
    <a href="#">Inicio</a>
    <a href="#catalogo">Catálogo</a>
    <a href="#">Información</a>
  </nav>
  <div class="carrito">🛒</div>
</header>

<section class="banner">
  <h1>Catálogo BAUVARE</h1>
  <p>Urban formal wear</p>
</section>

<main class="catalogo" id="catalogo"></main>

<div class="modal" id="modal">
  <div class="modal-content">
    <button class="cerrar" onclick="cerrarModal()">×</button>

    <div class="foto-modal">
      <button class="flecha izq" onclick="cambiarFoto(-1)">‹</button>
      <img id="fotoPrincipal" src="">
      <button class="flecha der" onclick="cambiarFoto(1)">›</button>
    </div>

    <div class="info">
      <h2 id="nombreProducto"></h2>

      <div class="bloque">
        <h4>Color</h4>
        <div class="colores" id="colores"></div>
      </div>

      <div class="bloque">
        <h4>Talla</h4>
        <div class="tallas" id="tallas"></div>
      </div>

      <p class="estado" id="estadoProducto"></p>

      <div class="bloque">
        <h4>Cantidad</h4>
        <div class="cantidad">
          <button onclick="cambiarCantidad(-1)">−</button>
          <strong id="cantidad">1</strong>
          <button onclick="cambiarCantidad(1)">+</button>
        </div>
      </div>

      <div class="detalles">
        <h4>Detalles de la prenda</h4>
        <ul id="detallesProducto"></ul>

        <h4 style="margin-top:18px;">Recomendaciones</h4>
        <ul id="recomendacionesProducto"></ul>

        <h4 style="margin-top:18px;">Tabla de medidas</h4>
        <table class="tabla-medidas">
          <thead>
            <tr>
              <th>Talla</th>
              <th>Pecho</th>
              <th>Largo</th>
              <th>Manga</th>
            </tr>
          </thead>
          <tbody id="tablaMedidas"></tbody>
        </table>
      </div>

      <div class="barra-compra">
        <p class="precio" id="precioProducto"></p>
        <button class="btn-wsp" id="btnWsp" onclick="pedirWhatsApp()">Pedir por WhatsApp</button>
      </div>
    </div>
  </div>
</div>

<a class="wsp" href="https://wa.me/51999999999" target="_blank">☘</a>

<script>
const productos = [
  {
    nombre:"Pantalón Cargo",
    precio:"S/ 89.90",
    descuento:10,
    colores:[
      {
        nombre:"Negro",
        codigo:"#000000",
        disponible:true,
        imagenes:[
          "https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?w=900",
          "https://images.unsplash.com/photo-1516762689617-e1cffcef479d?w=900"
        ],
        stock:{S:3,M:2,L:0,XL:1}
      },
      {
        nombre:"Blanco",
        codigo:"#ffffff",
        disponible:true,
        imagenes:[
          "https://images.unsplash.com/photo-1523398002811-999ca8dec234?w=900",
          "https://images.unsplash.com/photo-1503341455253-b2e723bb3dbb?w=900"
        ],
        stock:{S:2,M:2,L:0,XL:0}
      },
      {
        nombre:"Beige",
        codigo:"#c8b18a",
        disponible:false,
        imagenes:[
          "https://images.unsplash.com/photo-1602810318383-e386cc2a3ccf?w=900"
        ],
        stock:{S:0,M:0,L:0,XL:0}
      }
    ],
    tallas:["S","M","L","XL"],
    detalles:["Tela resistente y cómoda","Fit urbano formal","Bolsillos laterales funcionales"],
    recomendaciones:["Lavar con agua fría","No usar lejía","Planchar a temperatura baja"],
    medidas:[
      ["S","92 cm","98 cm","60 cm"],
      ["M","96 cm","100 cm","61 cm"],
      ["L","100 cm","102 cm","62 cm"],
      ["XL","104 cm","104 cm","63 cm"]
    ]
  },
  {
    nombre:"Polo Oversize",
    precio:"S/ 59.90",
    descuento:0,
    colores:[
      {
        nombre:"Blanco",
        codigo:"#ffffff",
        disponible:true,
        imagenes:[
          "https://images.unsplash.com/photo-1523398002811-999ca8dec234?w=900",
          "https://images.unsplash.com/photo-1503341455253-b2e723bb3dbb?w=900"
        ],
        stock:{S:2,M:3,L:0}
      },
      {
        nombre:"Negro",
        codigo:"#000000",
        disponible:true,
        imagenes:[
          "https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?w=900",
          "https://images.unsplash.com/photo-1516762689617-e1cffcef479d?w=900"
        ],
        stock:{S:0,M:1,L:1}
      }
    ],
    tallas:["S","M","L"],
    detalles:["Corte oversize","Algodón suave","Ideal para outfit urbano"],
    recomendaciones:["Lavar al revés","Secar bajo sombra","No exprimir"],
    medidas:[
      ["S","98 cm","70 cm","22 cm"],
      ["M","104 cm","72 cm","23 cm"],
      ["L","110 cm","74 cm","24 cm"]
    ]
  }
];

const catalogo = document.getElementById("catalogo");

let productoActual = null;
let colorActual = 0;
let tallaActual = "";
let fotoActual = 0;
let cantidadActual = 1;

productos.forEach((p,index)=>{
  catalogo.innerHTML += `
    <div class="producto" onclick="abrirModal(${index})">
      ${p.descuento ? `<span class="descuento">-${p.descuento}%</span>` : ""}
      <img src="${p.colores[0].imagenes[0]}" alt="${p.nombre}">
      <h3>${p.nombre}</h3>
      <p>${p.precio}</p>
    </div>
  `;
});

function abrirModal(index){
  productoActual = productos[index];
  colorActual = 0;
  tallaActual = productoActual.tallas[0];
  fotoActual = 0;
  cantidadActual = 1;

  document.getElementById("nombreProducto").textContent = productoActual.nombre;
  document.getElementById("precioProducto").textContent = productoActual.precio;
  document.getElementById("cantidad").textContent = cantidadActual;

  cargarTodo();
  document.getElementById("modal").style.display = "flex";
}

function cargarTodo(){
  cargarFoto();
  cargarColores();
  cargarTallas();
  cargarDetalles();
  verificarStock();
}

function cargarFoto(){
  const fotos = productoActual.colores[colorActual].imagenes;
  document.getElementById("fotoPrincipal").src = fotos[fotoActual];
}

function cambiarFoto(direccion){
  const color = productoActual.colores[colorActual];
  const fotosColor = color.imagenes;

  fotoActual += direccion;

  if(fotoActual >= fotosColor.length){
    colorActual++;
    if(colorActual >= productoActual.colores.length) colorActual = 0;
    fotoActual = 0;
  }

  if(fotoActual < 0){
    colorActual--;
    if(colorActual < 0) colorActual = productoActual.colores.length - 1;
    fotoActual = productoActual.colores[colorActual].imagenes.length - 1;
  }

  cargarTodo();
}

function cargarColores(){
  document.getElementById("colores").innerHTML = productoActual.colores.map((c,i)=>`
    <div class="color-circulo ${i===colorActual ? "activo" : ""} ${!c.disponible ? "agotado" : ""}"
         title="${c.nombre}"
         onclick="seleccionarColor(${i})"
         style="background:${c.codigo}"></div>
  `).join("");
}

function seleccionarColor(i){
  colorActual = i;
  fotoActual = 0;
  cargarTodo();
}

function cargarTallas(){
  const color = productoActual.colores[colorActual];

  document.getElementById("tallas").innerHTML = productoActual.tallas.map(t=>{
    const agotado = !color.stock[t] || color.stock[t] <= 0;

    return `
      <div class="talla-circulo ${t===tallaActual ? "activo" : ""} ${agotado ? "agotado" : ""}"
           onclick="seleccionarTalla('${t}')">${t}</div>
    `;
  }).join("");
}

function seleccionarTalla(t){
  tallaActual = t;
  cantidadActual = 1;
  document.getElementById("cantidad").textContent = cantidadActual;
  cargarTodo();
}

function verificarStock(){
  const color = productoActual.colores[colorActual];
  const stock = color.stock[tallaActual] || 0;
  const estado = document.getElementById("estadoProducto");
  const btn = document.getElementById("btnWsp");

  if(stock > 0 && color.disponible){
    estado.textContent = "Disponible";
    estado.className = "estado disponible";
    btn.disabled = false;
  }else{
    estado.textContent = "Agotado";
    estado.className = "estado agotado-texto";
    btn.disabled = true;
  }
}

function cambiarCantidad(num){
  const color = productoActual.colores[colorActual];
  const stock = color.stock[tallaActual] || 0;

  cantidadActual += num;

  if(cantidadActual < 1) cantidadActual = 1;
  if(cantidadActual > stock) cantidadActual = stock;

  document.getElementById("cantidad").textContent = cantidadActual;
}

function cargarDetalles(){
  document.getElementById("detallesProducto").innerHTML =
    productoActual.detalles.map(d=>`<li>${d}</li>`).join("");

  document.getElementById("recomendacionesProducto").innerHTML =
    productoActual.recomendaciones.map(r=>`<li>${r}</li>`).join("");

  document.getElementById("tablaMedidas").innerHTML =
    productoActual.medidas.map(m=>`
      <tr>
        <td>${m[0]}</td>
        <td>${m[1]}</td>
        <td>${m[2]}</td>
        <td>${m[3]}</td>
      </tr>
    `).join("");
}

function cerrarModal(){
  document.getElementById("modal").style.display = "none";
}

function pedirWhatsApp(){
  const color = productoActual.colores[colorActual].nombre;

  const mensaje = `Hola BAUVARE, quiero realizar un pedido:

Producto: ${productoActual.nombre}
Color: ${color}
Talla: ${tallaActual}
Cantidad: ${cantidadActual}
Precio: ${productoActual.precio}`;

  const numero = "51999999999";
  window.open(`https://wa.me/${numero}?text=${encodeURIComponent(mensaje)}`, "_blank");
}

window.onclick = function(e){
  if(e.target === document.getElementById("modal")){
    cerrarModal();
  }
}
</script>

</body>
</html>
