<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BAUVARE | Catálogo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="header">
    <h1>BAUVARE</h1>
    <p>Urban Formal Wear</p>
  </header>

  <section class="hero">
    <h2>Catálogo exclusivo</h2>
    <p>Prendas urbanas con estilo formal para vestir diferente.</p>
  </section>

  <main class="catalogo" id="catalogo"></main>

  <div class="modal" id="modal">
    <div class="modal-content">
      <button class="cerrar" onclick="cerrarModal()">×</button>

      <div class="galeria" id="galeria"></div>

      <div class="detalle">
        <h2 id="productoNombre"></h2>
        <p class="precio" id="productoPrecio"></p>

        <label>Color disponible</label>
        <select id="colorSeleccionado"></select>

        <label>Talla disponible</label>
        <select id="tallaSeleccionada"></select>

        <button class="btn-wsp" onclick="pedirWhatsApp()">
          Pedir por WhatsApp
        </button>
      </div>
    </div>
  </div>

  <footer>
    <p>© 2026 BAUVARE. Todos los derechos reservados.</p>
  </footer>

  <script src="productos.js"></script>
  <script>
    const catalogo = document.getElementById("catalogo");
    let productoActual = null;

    productos.forEach((producto, index) => {
      catalogo.innerHTML += `
        <article class="producto" onclick="abrirModal(${index})">
          <img src="${producto.imagenes[0]}" alt="${producto.nombre}">
          <div class="producto-info">
            <h3>${producto.nombre}</h3>
            <p>${producto.precio}</p>
          </div>
        </article>
      `;
    });

    function abrirModal(index) {
      productoActual = productos[index];

      document.getElementById("productoNombre").textContent = productoActual.nombre;
      document.getElementById("productoPrecio").textContent = productoActual.precio;

      document.getElementById("galeria").innerHTML = productoActual.imagenes.map(img => `
        <img src="${img}" alt="${productoActual.nombre}">
      `).join("");

      document.getElementById("colorSeleccionado").innerHTML = productoActual.colores.map(color => `
        <option value="${color}">${color}</option>
      `).join("");

      document.getElementById("tallaSeleccionada").innerHTML = productoActual.tallas.map(talla => `
        <option value="${talla}">${talla}</option>
      `).join("");

      document.getElementById("modal").style.display = "flex";
    }

    function cerrarModal() {
      document.getElementById("modal").style.display = "none";
    }

    function pedirWhatsApp() {
      const color = document.getElementById("colorSeleccionado").value;
      const talla = document.getElementById("tallaSeleccionada").value;
      const mensaje = `Hola BAUVARE, quiero pedir: ${productoActual.nombre}, color ${color}, talla ${talla}, precio ${productoActual.precio}.`;

      const numero = "51999999999";
      window.open(`https://wa.me/${numero}?text=${encodeURIComponent(mensaje)}`, "_blank");
    }
  </script>

</body>
</html>
